name: Library Build And Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Publish Library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      # JDK 17 covers both the root build (Gradle 7.2 wrapper, supports
      # Java 11/17) and the standalone canonical-cbor / tx-codec
      # subprojects (jvmToolchain(17) — Gradle 9.x requires Java 17).
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin
      # Provide a system `gradle` binary at version 9.x so
      # `make maven-cbor` can publish the standalone subprojects (the
      # root wrapper at 7.2 can't drive their modern plugins block).
      - name: Setup Gradle 9
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.1.0'
      - name: Cache Gradle packages
        uses: actions/cache@v2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      # Auto-publish from CI is currently disabled. Both halves of
      # `make maven` would fail on a fresh ubuntu-latest runner:
      #   - `make maven-legacy` uploads to https://s01.oss.sonatype.org,
      #     which Sonatype sunset on 2025-06-30.
      #   - `make maven-cbor` uses the vanniktech plugin's
      #     `publishAndReleaseToMavenCentral` task, which needs a GPG
      #     private key and Central Portal user token — neither is wired
      #     up in CI yet.
      #
      # Releases are produced from a maintainer's workstation; see
      # planning/canonical-cbor/release-checklist.md for the manual
      # flow. To re-enable CI auto-publish, the next maintainer needs:
      #   - secrets.MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD
      #   - secrets.SIGNING_GPG_KEY (armored private key) + passphrase
      #   - a GPG import step (crazy-max/ghaction-import-gpg@v6 or similar)
      #   - protobuf / wallet-sdk migrated off the legacy OSSRH URL, or
      #     `make maven` rewritten to skip them
      - name: Skip auto-publish (manual flow)
        run: |
          echo "::notice::Auto-publish disabled — release artifacts are pushed manually from a maintainer workstation. See planning/canonical-cbor/release-checklist.md."
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_HUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
      - name: Extract current version
        id: get_version
        run: |
          CURRENT_VERSION=$(cat version | awk '{$1=$1;print}')
          echo "CURRENT_VERSION=${CURRENT_VERSION}" >> $GITHUB_ENV
      - name: Send Notification To Slack
        run: |
          curl -H 'Content-type: application/json' -X POST -d "{'text': 'New android walletkit lib v${{env.CURRENT_VERSION}} is out.'}" ${{secrets.CLIENTS_WEBHOOK}}
      - name: Cleanup Gradle Cache
        run: |
          rm -f ~/.gradle/caches/modules-2/modules-2.lock
          rm -f ~/.gradle/caches/modules-2/gc.properties
